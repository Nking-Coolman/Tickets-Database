* { box-sizing: border-box; }

.controls button.alt { background: #fff; color: var(--brand); }
.meta { margin: 10px 2px 12px; color: var(--muted); display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }

.preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
.noimg { font-size: 13px; color: #7f8fa3; padding: 12px; text-align: center; }
.info { padding: 12px; display: grid; gap: 6px; align-content: start; }
.k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
.v { font-size: 14px; }
.row { display: grid; gap: 2px; }
.actions { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
.actions a { text-decoration: none; font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line); color: var(--text); background: #fff; }
.actions a.primary { background: var(--brand-soft); color: var(--brand); border-color: #b4c8dd; }
@media (max-width: 1100px) {

const PREFER_PREVIEWS = true;

const qEl = document.getElementById('q');
const fromEl = document.getElementById('fromDate');
const toEl = document.getElementById('toDate');
const gridEl = document.getElementById('grid');
const countEl = document.getElementById('resultCount');

function text(v) { return (v || '').toString(); }

function digitsOnly(v) {
  return text(v).replace(/\D/g, '');
}

function parseQueryTerms(raw) {
  return text(raw)
    .split(/[;,\n]+/)
    .map((t) => t.trim().toLowerCase())
    .filter((t) => t.length > 0);
}

function inDateRange(itemDate, fromDate, toDate) {
  if (!itemDate) return !(fromDate || toDate);
  if (fromDate && itemDate < fromDate) return false;
  if (toDate && itemDate > toDate) return false;
  return true;
}

function matchesTerm(r, q) {
  if (!q) return true;

  const hay = [r.account, r.customer, r.ticket_ref, r.source_file, r.page, r.search_date]
    .map(text)
    .join('\n')
    .toLowerCase();
  if (hay.indexOf(q) !== -1) return true;

  // Also support digit-only matching for account and ticket numbers.
  const qDigits = q.replace(/\D/g, '');
  if (!qDigits) return false;
  const acctDigits = digitsOnly(r.account);
  const refDigits = digitsOnly(r.ticket_ref);
  return acctDigits.indexOf(qDigits) !== -1 || refDigits.indexOf(qDigits) !== -1;
}

function matchesQuery(r, terms) {
  if (!terms.length) return true;
  return terms.some((term) => matchesTerm(r, term));
}

function cardHtml(r) {
  let preview = '<div class="noimg">No preview image</div>';
  if (PREFER_PREVIEWS && r.preview_url) {
    preview = '<img loading="lazy" src="' + r.preview_url + '" alt="' + text(r.source_file) + ' page ' + text(r.page) + '">';
  }

  const pageUrl = text(r.page_url);
  const pdfUrl = text(r.pdf_url);

  return [
    '<article class="card">',
      '<div class="preview">' + preview + '</div>',
      '<div class="info">',
        '<div class="row"><div class="k">Account</div><div class="v">' + (text(r.account) || '-') + '</div></div>',
        '<div class="row"><div class="k">Customer</div><div class="v">' + (text(r.customer) || '-') + '</div></div>',
        '<div class="row"><div class="k">Ticket Date</div><div class="v">' + (text(r.search_date) || '-') + '</div></div>',
        '<div class="row"><div class="k">Ticket Ref</div><div class="v">' + (text(r.ticket_ref) || '-') + '</div></div>',
        '<div class="row"><div class="k">File / Page</div><div class="v">' + text(r.source_file) + ' / p.' + text(r.page) + '</div></div>',
        '<div class="row"><div class="k">Address</div><div class="v">' + (text(r.delivery_address) || '-') + '</div></div>',
        '<div class="actions">',
          (pageUrl ? '<a class="primary" target="_blank" href="' + pageUrl + '">Open Ticket Page</a>' : ''),
          (pageUrl ? '<a target="_blank" href="' + pageUrl + '">Print Ticket</a>' : ''),
          (pdfUrl ? '<a target="_blank" href="' + pdfUrl + '">Open Full PDF</a>' : ''),
        '</div>',
      '</div>',
    '</article>'
  ].join('');
}

function wirePreviewFallbacks() {
  const imgs = gridEl.querySelectorAll('.preview img');
  imgs.forEach((img) => {
    img.addEventListener('error', () => {
      const holder = img.closest('.preview');
      if (holder) holder.innerHTML = '<div class="noimg">No preview image</div>';
    }, { once: true });
  });
}

function applyFilters() {
  const qRaw = qEl.value.trim();
  const terms = parseQueryTerms(qRaw);
  const fromDate = fromEl.value;
  const toDate = toEl.value;

  const filtered = DATA.filter((r) => matchesQuery(r, terms) && inDateRange(r.search_date, fromDate, toDate));
  filtered.sort((a, b) => text(b.search_date).localeCompare(text(a.search_date)) || text(a.account).localeCompare(text(b.account)));

  const label = qRaw ? ('Search: "' + qRaw + '" | ') : '';
  countEl.textContent = label + filtered.length + ' result' + (filtered.length === 1 ? '' : 's');
  if (!filtered.length) {
    gridEl.innerHTML = '<article class="card"><div class="info"><div class="v">No tickets match these filters.</div></div></article>';
    return;
  }
  gridEl.innerHTML = filtered.map(cardHtml).join('');
  wirePreviewFallbacks();
}

document.getElementById('applyBtn').addEventListener('click', applyFilters);
document.getElementById('clearBtn').addEventListener('click', () => {
  qEl.value = '';
  fromEl.value = '';
  toEl.value = '';
  applyFilters();
});
qEl.addEventListener('input', applyFilters);
qEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    applyFilters();
  }
});
fromEl.addEventListener('change', applyFilters);
toEl.addEventListener('change', applyFilters);

applyFilters();
</script>
